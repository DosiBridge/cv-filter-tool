services:
  backend:
    image: dosibirdge/cv-filter-tool-backend:latest
    container_name: cv-filter-tool-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8089:8000"
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "gpt-4o-mini"
      CORS_ORIGINS: "https://cvfilter.dosibridge.com"
    volumes:
      - cv_filter_uploads:/app/uploads
      - cv_filter_storage:/app/file_storage
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: dosibirdge/cv-filter-tool-frontend:latest
    container_name: cv-filter-tool-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:3000"
    environment:
      NODE_ENV: "production"
      NEXT_PUBLIC_API_URL: "https://cvfilterapi.dosibridge.com"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  cv_filter_uploads:
  cv_filter_storage:
